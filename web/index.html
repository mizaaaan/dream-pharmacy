<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Dream Pharmacy — To the satisfaction of Almighty">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Dream Pharmacy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Dream Pharmacy</title>
  <link rel="manifest" href="manifest.json">

  <meta name="theme-color" content="#E2231A">

  <!-- Open Graph / social share preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Dream Pharmacy">
  <meta property="og:description" content="Dream Pharmacy — To the satisfaction of Almighty">
  <meta property="og:image" content="https://dream-pharmacy.vercel.app/icons/Icon-512.png">
  <meta property="og:url" content="https://dream-pharmacy.vercel.app">

  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Dream Pharmacy">
  <meta name="twitter:description" content="Dream Pharmacy — To the satisfaction of Almighty">
  <meta name="twitter:image" content="https://dream-pharmacy.vercel.app/icons/Icon-512.png">

  <style>
    #splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F4F1EC;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #splash h1 {
      margin: 0 0 16px 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #E2231A;
    }
    #splash .spinner {
      width: 34px;
      height: 34px;
      border: 3px solid #E2E2E2;
      border-top-color: #E2231A;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="splash">
    <h1>Dream Pharmacy</h1>
    <div class="spinner"></div>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function () { splash.remove(); }, 300);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
